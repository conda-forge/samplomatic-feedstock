schema_version: 1

context:
  version: "0.18.0"

package:
  name: samplomatic
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/samplomatic/samplomatic-${{ version }}.tar.gz
  sha256: a7185c063bc0da1da21ae1d92218957e56963239cc2d9190789673c6b9acb02e

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - setuptools-scm
    - pip
  run:
    - python >=${{ python_min }}
    - qiskit >=2.3.0
    - numpy >=1.26
    - rustworkx >=0.16.0
    - pybase64 >=1.4.0
    - orjson >=3.9.0

tests:
  - python:
      imports:
        - samplomatic
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Serving all of your circuit sampling needs since 2025.
  license: Apache-2.0
  license_file: LICENSE.txt
  homepage: https://github.com/Qiskit/samplomatic

extra:
  recipe-maintainers:
    - wshanks
